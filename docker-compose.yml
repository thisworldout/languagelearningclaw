services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lluser
      POSTGRES_PASSWORD: llpass
      POSTGRES_DB: languagelearning
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lluser -d languagelearning"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://lluser:llpass@postgres:5432/languagelearning
      API_KEY: ${API_KEY:-dev-insecure-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  telegram:
    profiles: ["telegram"]
    build:
      context: ./telegram_bot
      dockerfile: Dockerfile
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      LEARNING_API_BASE: http://api:8000
      LEARNING_API_KEY: ${API_KEY:-dev-insecure-change-me}
    depends_on:
      - api

  # OpenClaw is installed and configured per https://docs.openclaw.ai — run it on the host or add
  # a custom image here once you have a pinned install path. Point tools at http://api:8000.

volumes:
  pgdata:
